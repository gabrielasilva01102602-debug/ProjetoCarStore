<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro </h1>
            <p>Descreva as características dos deu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="">Título do Anúncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para anuciar seu carro">
                </div>
                <div>
                    <label for="">Preco <span>*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>
                <div>
                    <label for="descricao"></label>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
