<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="cabecalho">
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div class="caixaInputs" class="form-container">
        <div class="caixaInputs" class="form-header">
            <p>Formulário</p>
        </div>
        <div class="caixaInputs">
            <h1 class="titulo-form">Venda fácil seu carro </h1>
            <p>Descreva as características dos deu carro e marque os opcionais que ele possui</p>
            <form onsubmit="salvarCarros(event)">
                <div class="caixaInputs">
                    <label for="title">Título do Anúncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Um título para anuciar seu carro">
                </div>
                <div class="caixaInputs">
                    <label for="preco">Preco <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" class="block" placeholder="Defina o preço">
                </div class="caixaInputs">
                <div class="caixaInputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio"></span></label>
                    <textarea name="descricao" id="descricao" class="block"></textarea>
                </div>
                <div class="caixaInputs">
                    <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="Coloque a marca do seu veículo">
                </div>
                <div class="caixaInputs">
                    <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="Defina a marca do seu veículo">
                </div>
                <div class="caixaInputs">
                    <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                    <input type="nuber" name="kilometragem" id="kilometragem" class="block" placeholder="kilometragem do deu carro">
                </div>
                <div class="caixaInputs">
                    <label for="dataDeCompra">Data De Compra <span class="campo-obrigatorio">*</span></label>
                    <input type="date" name="dataDeCompra" id="dataDeCompra" class="block">
                </div>
                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="manual">Automatico</label>
                </div class="caixaInputs">

                <div class="caixaOpcional">
                   <p>Opcionais</p>
                   <ul>
                    <li>
                        <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                        <label for="airbag">Airbag</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                        <label for="alarme">Alarme</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="arCondicionado" value="arCondicionado">
                        <label for="arCondicionado">Ar condicionado</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="cameraDeRe" value="cameraDeRe">
                        <label for="cameraDeRe">Câmera de ré</label>
                    </li>
                   </ul>
     
                </div>
                <div>
                   <p>Opcionais</p>
                   <ul>
                    <li>
                        <input type="checkbox" name="opcional[]" id="assistentePista" value="assistentePista">
                        <label for="assistentePista">Assistente de pista</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                        <label for="partidaSemChave">Partida sem Chave</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="integraçãoCelular" value="integraçãoCelular">
                        <label for="integraçãoCelular">Integração com Celular</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="bancoDeCouro" value="bancoDeCouro">
                        <label for="bancoDeCouro">Banco de Couro </label>
                    </li>
                   </ul>
                </div>
                <p>Fotos do carro <span class="campo-obrigatorio">>*</span></p>
                <input type="file" name="imagem" id="imagem" multiple accept="images/png, image/jpg">
                </div>
                <input type="submit" value="Enviar">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div></div>
        </div>
    </div>
    <script src="script/script.js"></script>
</body>
</html>
