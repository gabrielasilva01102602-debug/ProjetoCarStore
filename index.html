<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro </h1>
            <p>Descreva as características dos deu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Título do Anúncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para anuciar seu carro">
                </div>
                <div>
                    <label for="preco">Preco <span>*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>
                <div>
                    <label for="descricao">Descrição <span></span></label>
                    <textarea name="descricao" id="descricao"></textarea>
                </div>
                <div>
                    <label for="marca">Marca <span>*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Coloque a marca do seu veículo">
                </div>
                <div>
                    <label for="modelo">Modelo <span>*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Defina a marca do seu veículo">
                </div>
                <div>
                    <label for="kilometragem">Kilometragem <span>*</span></label>
                    <input type="nuber" name="kilometragem" id="kilometragem" placeholder="kilometragem do deu carro">
                </div>
                <div>
                    <label for="dataDeCompra">Data De Compra <span>*</span></label>
                    <input type="date" name="dataDeCompra" id="dataDeCompra">
                </div>
                <div>
                    <p>Tipo de Câmbio: <span>*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="manual">Automatico</label>
                </div>

                <div>
                   <p>Opcionais</p>
                   <ul>
                    <li>
                        <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                        <label for="airbag">Airbag</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                        <label for="alarme">Alarme</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="arCondicionado" value="arCondicionado">
                        <label for="arCondicionado">Ar condicionado</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="cameraDeRe" value="cameraDeRe">
                        <label for="cameraDeRe">Câmera de ré</label>
                    </li>
                   </ul>
     
                </div>
                <div>
                   <p>Opcionais</p>
                   <ul>
                    <li>
                        <input type="checkbox" name="opcional[]" id="assistentePista" value="assistentePista">
                        <label for="assistentePista">Assistente de pista</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                        <label for="partidaSemChave">Partida sem Chave</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opcional[]" id="integraçãoCelular" value="integraçãoCelular">
                        <label for="integraçãoCelular">Integração com Celular</label>
                    </li>
                    <li>
                         <input type="checkbox" name="opcional[]" id="bancoDeCouro" value="bancoDeCouro">
                        <label for="bancoDeCouro">Banco de Couro </label>
                    </li>
                   </ul>
                </div>
                <p>Fotos do carro <span>*</span></p>
                <input type="file" name="imagem" id="imagem" multiple accept="images/png, image/jpg">
                </div>
                <input type="submit" value="Enviar">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div></div>
        </div>
    </div>
</body>
</html>
